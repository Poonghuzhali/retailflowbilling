<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailFlow - Products</title>
    <script>tailwind.config={darkMode:'class'}</script>
    <script>!function(){try{var t=JSON.parse(localStorage.getItem('retailflow_settings')||'{}').theme||'light';if(t==='dark')document.documentElement.classList.add('dark')}catch(e){}}()</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark { background-color: #0f172a !important; } .dark body { background-color: #0f172a !important; } .dark .bg-white { background-color: #1e293b !important; } .dark .bg-\[\#D1D9DD\] { background-color: #0f172a !important; } .dark .text-gray-800 { color: #f1f5f9 !important; } .dark .text-gray-600 { color: #cbd5e1 !important; } .dark .text-gray-500 { color: #94a3b8 !important; } .dark .text-gray-400 { color: #94a3b8 !important; } .dark .text-gray-700 { color: #e2e8f0 !important; } .dark .border-gray-100 { border-color: #334155 !important; } .dark .border-gray-200 { border-color: #475569 !important; } .dark .divide-gray-100 > * { border-color: #334155 !important; } .dark .hover\:bg-gray-50:hover { background-color: #334155 !important; } .dark .bg-gray-50 { background-color: #0f172a !important; } .dark .shadow-lg { box-shadow: none !important; } .dark .shadow-sm { box-shadow: none !important; } .dark .shadow-xl { box-shadow: none !important; }
    </style>
    <script src="./assets/js/theme.js" defer></script>
    <script src="./assets/js/billing.js" defer></script>
</head>
<body class="bg-[#D1D9DD] text-gray-800" x-data="{ isOpen: false }">

    <header class="lg:hidden bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <div class="bg-[#4FA03D] p-1.5 rounded-lg text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <h1 class="font-bold text-lg">Retail<span class="text-[#4FA03D]">Flow</span></h1>
        </div>
        <button @click="isOpen = true" class="p-2 text-gray-600 bg-gray-50 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </header>

    <div class="flex h-screen overflow-hidden">
        <aside class="fixed inset-y-0 left-0 z-50 w-64 bg-white transform lg:translate-x-0 lg:static lg:inset-0 transition duration-300 ease-in-out shadow-xl lg:shadow-none flex flex-col py-6 px-4"
               :class="isOpen ? 'translate-x-0' : '-translate-x-full'">
            <button @click="isOpen = false" class="lg:hidden absolute top-4 right-4 text-gray-400">✕</button>
            
              <div class="flex items-center justify-between lg:justify-start gap-2 px-2 mb-10">
                <div class="flex items-center gap-2">
                    <div class="bg-[#4FA03D] p-2 rounded-lg text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-xl">Retail<span class="text-[#4FA03D]">Flow</span></h1>
                        <p class="text-[10px] text-gray-500 uppercase font-semibold">Smart retail billing</p>
                    </div>
                </div>
                <button @click="isOpen = false" class="lg:hidden text-gray-400 p-2">✕</button>
            </div>

            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition">🏠 Dashboard</a>
                <a href="product.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition">📦 Products</a>
                <a href="customer.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition">👤 Customers</a>
                <a href="billing.html" class="flex items-center gap-3 px-4 py-3  bg-[#4FA03D] text-white rounded-xl font-medium shadow-lg shadow-green-100">💵 Billing</a>
                <a href="invoice.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition">📄 Invoices</a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition mt-auto">⚙️ Settings</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <header class="mb-6">
                <h2 class="text-2xl font-bold">Billing</h2>
                <p class="text-gray-500 text-sm">Create new invoices quickly</p>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
                <div class="xl:col-span-7 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        <div class="flex items-center gap-3">
                            <div class="relative flex-1">
                                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">🔍</span>
                                <input id="searchInput" type="text" placeholder="Search product by name or sku" oninput="searchProducts()" class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-[#4FA03D] focus:outline-none">
                            </div>
                            <button class="bg-[#4FA03D] p-4 rounded-2xl text-white hover:bg-green-700 transition">🎤</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                        <div class="p-6 border-b">
                            <h3 class="font-bold text-gray-800">Available Products</h3>
                        </div>
                        <div id="availableProducts" class="p-6 space-y-3 max-h-[500px] overflow-y-auto"></div>
                    </div>
                </div>

                <div class="xl:col-span-5 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 relative">
                        <label class="block text-sm font-bold text-gray-600 mb-2">Customer Name</label>
                        <input id="customerSearch" type="text" placeholder="Search customer by name or phone" autocomplete="off" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-[#4FA03D] focus:outline-none">
                        <div id="customerDropdown" class="hidden absolute left-6 right-6 top-full mt-1 bg-white rounded-2xl shadow-xl border border-gray-100 z-50 max-h-60 overflow-y-auto"></div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 flex flex-col">
                        <div class="p-6 border-b flex justify-between items-center">
                            <h3 class="font-bold text-gray-800">Invoice Items</h3>
                            <span id="invoiceItemsCount" class="text-xs text-gray-400">0 items</span>
                        </div>
                        <div class="p-6 space-y-6">
                            <table class="w-full text-sm">
                                <thead class="text-gray-400 font-bold border-b">
                                    <tr>
                                        <th class="pb-4 text-left">Item</th>
                                        <th class="pb-4 text-center">Qty</th>
                                        <th class="pb-4 text-right">Price</th>
                                        <th class="pb-4 text-right">Total</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="invoiceItemsBody">
                                </tbody>
                            </table>

                            <div class="space-y-3 pt-4 text-gray-600 font-medium border-t">
                                <div class="flex justify-between"><span>Subtotal:</span><span id="subtotal" class="text-gray-800">₹0.00</span></div>
                                <div class="flex justify-between"><span>GST:</span><span id="gstAmount" class="text-gray-800">₹0.00</span></div>
                                <div class="flex justify-between text-xl font-bold text-gray-900 pt-2 border-t"><span>Grand Total:</span><span id="grandTotal">₹0.00</span></div>
                            </div>

                            <div class="grid grid-cols-3 gap-3 pt-4">
                                <button onclick="saveInvoice('Paid')" class="bg-[#4FA03D] text-white py-4 rounded-2xl flex flex-col items-center gap-1 hover:bg-green-700 transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                                    <span class="text-[10px] font-bold uppercase">Save</span>
                                </button>
                                <button onclick="saveInvoice('Pending')" class="bg-[#F2D13D] text-white py-4 rounded-2xl flex flex-col items-center gap-1 hover:bg-yellow-600 transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    <span class="text-[10px] font-bold uppercase">Pending Bill</span>
                                </button>
                                <button onclick="saveInvoice('Cancelled')" class="bg-red-500 text-white py-4 rounded-2xl flex flex-col items-center gap-1 hover:bg-red-600 transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    <span class="text-[10px] font-bold uppercase">Cancel Bill</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
